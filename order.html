<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chris's Book Shop</title>
    <link rel = "stylesheet" href = "site.css" type="text/css"/>
    <style>
        .input-group{
            margin-bottom: 2px;
        }
        .input-group input,
        .input-group textarea,
        .input-group select{
            padding: 10px;
            border: solid 1px #999;
            border-radius: 2px;
            width: 100%;
        }

        label{
            font-weight: 600;
        }

        input[type="reset"]{
            background: transparent;
            border: 0;
            text-decoration: underline;
            cursor: pointer;
            color: red;
        }
        input[type = "submit"]{
            border: solid 1px #999;
            border-radius:3px;
            padding:10px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <nav class = "navbar">
                <div class = "burger">
                    <div class = "layer1"></div> 
                    <div class = "layer2"></div> 
                    <div class = "layer3"></div> 
                </div>
                <div class = "logo">
                    <a href = "/">
                        <img src = "images/booklogo.png" alt = "Chris's Book Shop" >
                    </a>
                </div>
                <div class = "menubar">
                    <ul class = "list">
                        <li class = "list-items"><a href="/">About</a></li>
                        <li class = "list-items"><a href="books.html">Books</a></li>
                        <li class = "list-items"><a href="contact.html">Contact</a></li>
                    </ul>
                </div>
                <div class = "shopping cart">
                    <p class = "text">
                        Hello
                    </p>
                </div>
            </nav>
        </nav>
    </header> 
    <main>
        <aside><img src = "images/booklogo.png" alt = "Chris's Book Shop" ></aside>
        <article>
            <h1>Order</h1>
            <div class="book">
                <img src="images/Monster.jpeg" alt = "The Serrated Six"/>
                <div class = "columns">
                    <div class = "title">The Serrated Six</div>
                    <div class="price">$3.95</div>
                </div>
                <p class = "desc">A story of six hunters searching for a mythical monster</p>
            </div>
            <form action = "http://localhost:7071/api/post" method = "POST">
                <input type = "hidden" id="book-order"name = "book-order">
                <input type = "hidden" id = "location" name = "location">
                <div class="input-group">
                    <div><label for="first-name">First name</label></div>
                    <div><input type="text" name = "first-name" id = "first-name"</div>
                <div class="input-group">
                    <div><label for="last-name">Last name</label></div>
                    <div><input type="text" name = "last-name" id = "last-name"</div>
                <div class="input-group">
                    <div><label for="address">Address</label></div>
                    <div><input type="text" name = "address" id = "address"</div>
                <div class="input-group">
                    <div><label for="state">State</label></div>
                    <div>
                        <select name="state" id = "state">
                        <option value="Alabama">Alabama</option>
                        <option value="Alaska">Alaska</option>
                        <option value="Arizona">Arizona</option>
                        <option value="Arkansas">Arkansas</option>
                        <option value="California">California</option>
                        <option value="Colorado">Colorado</option>
                        <option value="Connecticut">Connecticut</option>
                        <option value="Delaware">Delaware</option>
                        <option value="Florida">Florida</option>
                        <option value="Georgia">Georgia</option>
                        <option value="Hawaii">Hawaii</option>
                        <option value="Idaho">Idaho</option>
                        <option value="Illinois">Illinois</option>
                        <option value="Indiana">Indiana</option>
                        <option value="Iowa">Iowa</option>
                        <option value="Kansas">Kansas</option>
                        <option value="Kentucky">Kentucky</option>
                        <option value="Louisiana">Louisiana</option>
                        <option value="Maine">Maine</option>
                        <option value="Maryland">Maryland</option>
                        <option value="Massachusetts">Massachusetts</option>
                        <option value="Montana">Montana</option>
                        <option value="Nebraska">Nebraska</option>
                        <option value="New Hampshire">New Hampshire</option>
                        <option value="New Jersey">New Jersey</option>
                        <option value="New Mexico">New Mexico</option>
                        <option value="New York">New York</option>
                        <option value="North Carolina">North Carolina</option>
                        <option value="North Dakota">North Dakota</option>
                        <option value="Ohio">Ohio</option>
                        <option value="Oklahoma">Oklahoma</option>
                        <option value="Oregon">Oregon</option>
                        <option value="Pennsylvania">Pennsylvania</option>
                        <option value="Rhode Island">Rhode Island</option>
                        <option value="South Carolina">South Carolina</option>
                        <option value="South Dakota">South Dakota</option>
                        <option value="Tennessee">Tennessee</option>
                        <option value="Texas">Texas</option>
                        <option value="Utah">Utah</option>
                        <option value="Vermont">Vermont</option>
                        <option value="Virginia">Virginia</option>
                        <option value="Washington">Washington</option>
                        <option value="West Virginia">West Virginia</option>
                        <option value="Wisconsin">Wisconsin</option>
                        <option value="Wyoming">Wyoming</option>
                        </select>
                    </div>
                <div class="input-group">
                    <div><label for="postal-code">Postal code</label></div>
                    <div><input type="text" name = "postal-code" id = "postal-code"></div>
                <div class="input-group">
                    <div><label for="comments">Comments</label></div>
                    <div><textarea
                        name = "comments"
                        id = "comments"
                        cols="30"
                        rows="10"
                        ></textarea>
                    </div>
                </div>

                <input type = "reset" value = "Reset"/>
                <input type = "submit" value = "Order"/>
        </article>
    </main>
    <footer>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="books.html">Books</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </footer>
    <script>
        window.addEventListener("DOMContentLoaded", function(e){
            let locationBox = document.querySelector("#location");
            let location = {
                latitude: "unknown",
                longitude: "unknown"
            };
            window.navigator.geolocation.getCurrentPosition(
                function(position){
                    location = {
                        latitude: position.coords.latitude,
                        longitude: position.coords.longitude
                    };
                    locationBox.value = JSON.stringify(location);
                },
                function(error){
                    locationBox.value = JSON.stringify(location);
                }
            );
            const order = localStorage.getItem("order");
            if(order){
                const bookOrder = parse(order);
                const orderInput = document.querySelector("#book-order");
                orderInput.value = order;
                const book = document.querySelector(".book");
                const title = book.querySelector(".title");
                const price = book.querySelector(".price");
                const desc = book.querySelector(".desc");
                title.innerText = bookOrder.title;
                price.innerText = bookOrder.price;
                desc.innerText = bookOrder.desc;

                const img = book.querySelector("img");
                img.setAttribute("src", "images/${bookOrder.id}.png");
                img.setAttribute("alt", bookOrder.title);
            }
        });
    </script>
</body>
</html>
